name: Build SermonScribe Win7 Push

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-sermonscribe-win7-push.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'
      - name: Download and restore launcher source
        shell: powershell
        run: |
          Invoke-WebRequest -UseBasicParsing -Uri 'https://raw.githubusercontent.com/Veektall/LightWorship/main/.sermonscribe-build/source.b64' -OutFile 'source.b64'
          $encoded = (Get-Content 'source.b64' -Raw).Trim()
          [IO.File]::WriteAllBytes('source.gz', [Convert]::FromBase64String($encoded))
          $input = [IO.File]::OpenRead('source.gz')
          $output = [IO.File]::Create('start_sermonscribe.py')
          $gzip = New-Object IO.Compression.GzipStream($input, [IO.Compression.CompressionMode]::Decompress)
          $gzip.CopyTo($output)
          $gzip.Dispose(); $output.Dispose(); $input.Dispose()
      - name: Install PyInstaller
        shell: cmd
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install pyinstaller==5.13.2
      - name: Build Windows 7 launcher
        shell: cmd
        run: pyinstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py
      - name: Verify executable
        shell: powershell
        run: |
          $file = Get-Item 'dist\Start SermonScribe.exe'
          if ($file.Length -lt 1000000) { throw 'Launcher is unexpectedly small.' }
          python --version
          python -c "import struct; d=open(r'dist\Start SermonScribe.exe','rb').read(); p=struct.unpack_from('<I',d,0x3c)[0]; print('PE machine:',hex(struct.unpack_from('<H',d,p+4)[0]))"
      - uses: actions/upload-artifact@v4
        with:
          name: sermonscribe-win7-launcher
          path: dist/Start SermonScribe.exe
          if-no-files-found: error
          retention-days: 1
