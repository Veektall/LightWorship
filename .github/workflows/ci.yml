name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore LightWorship.sln

      - name: Build
        run: msbuild LightWorship.sln /t:Build /p:Configuration=Debug /p:Platform="Any CPU" /nologo

      - name: Run tests
        run: .\tests\LightWorship.Tests\bin\Debug\LightWorship.Tests.exe

  build-sermonscribe-win7:
    name: Build SermonScribe Win7 launcher
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'

      - name: Restore launcher source
        shell: powershell
        run: |
          $b64 = (Get-Content '.sermonscribe\start_sermonscribe.py.gz.b64' -Raw).Trim()
          [IO.File]::WriteAllBytes('source.gz', [Convert]::FromBase64String($b64))
          $input = [IO.File]::OpenRead('source.gz')
          $gzip = New-Object IO.Compression.GzipStream($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create('start_sermonscribe.py')
          $gzip.CopyTo($output)
          $output.Close()
          $gzip.Close()
          $input.Close()

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==5.13.2

      - name: Build launcher
        run: pyinstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py

      - name: Verify PE architecture
        shell: powershell
        run: |
          Get-Item 'dist\Start SermonScribe.exe' | Format-List Name,Length
          python -c "import struct; f=open(r'dist\Start SermonScribe.exe','rb'); f.seek(60); o=struct.unpack('<I',f.read(4))[0]; f.seek(o+4); print('PE machine:',hex(struct.unpack('<H',f.read(2))[0]))"

      - name: Upload launcher
        uses: actions/upload-artifact@v4
        with:
          name: sermonscribe-win7-launcher
          path: dist/Start SermonScribe.exe
          retention-days: 1
