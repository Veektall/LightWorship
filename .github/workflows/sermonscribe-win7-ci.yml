name: SermonScribe Win7 CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'
      - name: Restore launcher source from build branch
        shell: pwsh
        run: |
          git fetch --depth=1 origin sermonscribe-win7-build
          git show FETCH_HEAD:.github/workflows/build-sermonscribe-win7.yml | Set-Content -Encoding ASCII branch-workflow.yml
          $encoded = Get-Content 'branch-workflow.yml' | Where-Object { $_ -match '^[A-Za-z0-9+/=]{1000,}$' } | Select-Object -First 1
          if (-not $encoded) { throw 'Embedded launcher source was not found.' }
          [IO.File]::WriteAllBytes('source.gz', [Convert]::FromBase64String($encoded.Trim()))
          $input = [IO.File]::OpenRead('source.gz')
          $gzip = New-Object IO.Compression.GzipStream($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create('start_sermonscribe.py')
          $gzip.CopyTo($output)
          $output.Dispose(); $gzip.Dispose(); $input.Dispose()
      - name: Build 32-bit Python 3.8 launcher
        shell: cmd
        run: |
          python -m pip install pyinstaller==5.13.2
          python -m PyInstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py
      - name: Verify PE32 architecture
        shell: pwsh
        run: |
          $bytes = [IO.File]::ReadAllBytes('dist/Start SermonScribe.exe')
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw "Expected PE32 x86, got $machine" }
      - uses: actions/upload-artifact@v4
        with:
          name: sermon-scribe-win7-launcher
          path: dist/Start SermonScribe.exe
          if-no-files-found: error
