name: SermonScribe Win7 CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'
      - name: Restore launcher source
        shell: pwsh
        run: |
          if (-not (Test-Path '.sermonscribe-build/source.gz')) { throw 'Launcher source archive is missing.' }
          $input = [IO.File]::OpenRead('.sermonscribe-build/source.gz')
          $gzip = New-Object IO.Compression.GzipStream($input, [IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create('start_sermonscribe.py')
          $gzip.CopyTo($output)
          $output.Dispose(); $gzip.Dispose(); $input.Dispose()
      - name: Build 32-bit Python 3.8 launcher
        shell: cmd
        run: |
          python -m pip install pyinstaller==5.13.2
          python -m PyInstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py
      - name: Verify PE32 architecture
        shell: pwsh
        run: |
          $bytes = [IO.File]::ReadAllBytes('dist/Start SermonScribe.exe')
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw "Expected PE32 x86, got $machine" }
      - uses: actions/upload-artifact@v4
        with:
          name: sermon-scribe-win7-launcher
          path: dist/Start SermonScribe.exe
          if-no-files-found: error
