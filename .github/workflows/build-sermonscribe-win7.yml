name: SermonScribe Win7 Build

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'
      - name: Restore complete launcher and server sources
        shell: pwsh
        run: |
          python -c "import gzip,base64,pathlib; pathlib.Path('start_sermonscribe.py').write_bytes(gzip.decompress(base64.b64decode(pathlib.Path('.sermonscribe-build/source.b64').read_text().strip())))"
          Get-Content .sermonscribe-build/server.00.b64,.sermonscribe-build/server.01.b64,.sermonscribe-build/server.02.b64,.sermonscribe-build/server.03.b64 -Raw | Set-Content -NoNewline server-combined.b64
          python -c "import gzip,base64,pathlib; pathlib.Path('sermonscribe_server.py').write_bytes(gzip.decompress(base64.b64decode(pathlib.Path('server-combined.b64').read_text().strip())))"
          python -m py_compile start_sermonscribe.py sermonscribe_server.py
          python -c "import ast,pathlib; tree=ast.parse(pathlib.Path('start_sermonscribe.py').read_text()); names={n.names[0].name for n in ast.walk(tree) if isinstance(n,ast.Import)}; assert 'ctypes' not in names"
      - name: Build Windows 7 folder runtime
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install "pyinstaller==4.10"
          python -m PyInstaller --noconfirm --clean --onedir --console --name "Start SermonScribe" start_sermonscribe.py
      - name: Verify PE32 runtime and required native modules
        shell: pwsh
        run: |
          $root = "dist/Start SermonScribe"
          $exe = Join-Path $root "Start SermonScribe.exe"
          if (!(Test-Path $exe)) { throw "Launcher was not produced" }
          if (!(Test-Path (Join-Path $root "_socket.pyd"))) { throw "_socket.pyd was not bundled" }
          if (!(Test-Path (Join-Path $root "python38.dll"))) { throw "python38.dll was not bundled" }
          $bytes = [IO.File]::ReadAllBytes($exe)
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw ("Expected PE32 x86, got 0x{0:X}" -f $machine) }
          Get-ChildItem $root | Select-Object Name,Length
      - uses: actions/upload-artifact@v4
        with:
          name: sermon-scribe-win7-runtime-pyinstaller410
          path: dist/Start SermonScribe/
          if-no-files-found: error
          retention-days: 3
