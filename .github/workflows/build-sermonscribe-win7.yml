name: SermonScribe Win7 CI

on:
  pull_request:
    paths:
      - '.github/workflows/build-sermonscribe-win7.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'
      - name: Restore launcher source from build branch
        shell: pwsh
        run: |
          python -c "import re,base64,gzip,pathlib; s=pathlib.Path('.github/workflows/build-sermonscribe-win7.yml').read_text(encoding='utf-8'); b=re.search(r'(?m)^([A-Za-z0-9+/]{100,}={0,2})$',s).group(1); pathlib.Path('start_sermonscribe.py').write_bytes(gzip.decompress(base64.b64decode(b))); print('restored',pathlib.Path('start_sermonscribe.py').stat().st_size,'bytes')"
          python -m py_compile start_sermonscribe.py
      - name: Build 32-bit Python 3.8 launcher
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install "pyinstaller==5.13.2"
          python -m PyInstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py
      - name: Verify PE32 and embedded Python 3.8 runtime
        shell: pwsh
        run: |
          python -c "import struct,pathlib; p=pathlib.Path(r'dist/Start SermonScribe.exe'); d=p.read_bytes(); f=p.open('rb'); f.seek(60); o=struct.unpack('<I',f.read(4))[0]; f.seek(o+4); m=struct.unpack('<H',f.read(2))[0]; assert m==0x14c,hex(m); assert b'python38.dll' in d; assert b'python312.dll' not in d; print('PE machine:',hex(m),'size:',p.stat().st_size,'python38.dll confirmed')"
          Get-FileHash 'dist/Start SermonScribe.exe' -Algorithm SHA256
      - uses: actions/upload-artifact@v4
        with:
          name: sermonscribe-win7-launcher
          path: dist/Start SermonScribe.exe
          retention-days: 1
          if-no-files-found: error
