name: Build SermonScribe Windows 7 launcher

on:
  push:
    branches: [sermonscribe-win7-build]
    paths:
      - 'sermonscribe-win7/**'
      - '.github/workflows/build-sermonscribe-win7.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Set up 32-bit Python 3.8.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'
      - name: Restore and validate launcher source
        shell: pwsh
        run: |
          python -c "import gzip,base64,pathlib; pathlib.Path('start_sermonscribe.py').write_bytes(gzip.decompress(base64.b64decode(pathlib.Path('sermonscribe-win7/source.b64').read_text().strip())))"
          python -m py_compile start_sermonscribe.py
          python --version
      - name: Install pinned packager
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install "pyinstaller==5.13.2"
          python -m PyInstaller --version
      - name: Build Windows 7 compatible launcher
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py
          if (!(Test-Path "dist/Start SermonScribe.exe")) { throw "Launcher was not produced" }
          Get-Item "dist/Start SermonScribe.exe" | Format-List Name,Length,LastWriteTime
      - name: Upload launcher
        uses: actions/upload-artifact@v4
        with:
          name: sermon-scribe-win7-launcher
          path: dist/Start SermonScribe.exe
          if-no-files-found: error
          retention-days: 3
