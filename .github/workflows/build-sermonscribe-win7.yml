name: Build SermonScribe Windows 7 launcher

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8 x86
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'

      - name: Restore launcher source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build/sermonscribe-win7 | Out-Null
          $encoded = @'

'@
          $compressed = [Convert]::FromBase64String(($encoded -replace '\s',''))
          $input = New-Object System.IO.MemoryStream(,$compressed)
          $gzip = New-Object System.IO.Compression.GZipStream($input,[System.IO.Compression.CompressionMode]::Decompress)
          $output = [System.IO.File]::Create('build/sermonscribe-win7/start_sermonscribe.py')
          $gzip.CopyTo($output)
          $output.Dispose(); $gzip.Dispose(); $input.Dispose()

      - name: Install Windows 7-compatible packager
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install "pyinstaller==5.13.2"

      - name: Verify source under Python 3.8
        shell: pwsh
        run: |
          python -m py_compile build/sermonscribe-win7/start_sermonscribe.py
          python -c "import sys; assert sys.version_info[:2] == (3, 8), sys.version"

      - name: Build launcher
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" build/sermonscribe-win7/start_sermonscribe.py

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = Get-Item "dist/Start SermonScribe.exe"
          if ($exe.Length -lt 1000000) { throw "Executable is unexpectedly small." }
          Get-FileHash $exe.FullName -Algorithm SHA256
          python -c "p=open(r'dist/Start SermonScribe.exe','rb').read(); assert b'python38.dll' in p; assert b'python312.dll' not in p; print('Embedded runtime marker: python38.dll')"

      - name: Upload launcher
        uses: actions/upload-artifact@v4
        with:
          name: sermon-scribe-win7-launcher
          path: dist/Start SermonScribe.exe
          if-no-files-found: error
