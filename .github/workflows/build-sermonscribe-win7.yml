name: SermonScribe Win7 CI

on:
  push:
    branches: [sermonscribe-win7-build]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Set up 32-bit Python 3.8.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'
      - name: Restore launcher source
        shell: pwsh
        run: |
          python -c "import gzip,base64,pathlib; pathlib.Path('start_sermonscribe.py').write_bytes(gzip.decompress(base64.b64decode(pathlib.Path('.sermonscribe-build/source.b64').read_text().strip())))"
          python -m py_compile start_sermonscribe.py
          python --version
      - name: Build 32-bit Python 3.8 launcher
        shell: pwsh
        run: |
          python -m pip install --upgrade "pip<25"
          python -m pip install "pyinstaller==5.13.2"
          python -m PyInstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py
          if (!(Test-Path "dist/Start SermonScribe.exe")) { throw "Launcher was not produced" }
      - name: Verify PE32 architecture
        shell: pwsh
        run: |
          $bytes = [IO.File]::ReadAllBytes("dist/Start SermonScribe.exe")
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw ("Expected PE32 x86, got 0x{0:X}" -f $machine) }
          Get-Item "dist/Start SermonScribe.exe" | Format-List Name,Length,LastWriteTime
      - name: Upload launcher
        uses: actions/upload-artifact@v4
        with:
          name: sermon-scribe-win7-launcher
          path: dist/Start SermonScribe.exe
          if-no-files-found: error
          retention-days: 3
