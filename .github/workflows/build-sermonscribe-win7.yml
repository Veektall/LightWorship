name: Build SermonScribe Windows 7 launcher

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up 32-bit Python 3.8.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.10'
          architecture: 'x86'

      - name: Restore launcher source
        shell: powershell
        run: |
          $encoded = (Get-Content '.sermonscribe-build\source.b64' -Raw).Trim()
          $bytes = [Convert]::FromBase64String($encoded)
          $input = New-Object IO.MemoryStream(,$bytes)
          $gzip = New-Object IO.Compression.GzipStream($input,[IO.Compression.CompressionMode]::Decompress)
          $output = [IO.File]::Create('start_sermonscribe.py')
          $gzip.CopyTo($output)
          $output.Dispose()
          $gzip.Dispose()
          $input.Dispose()
          python -m py_compile start_sermonscribe.py

      - name: Install Windows 7-compatible PyInstaller
        run: python -m pip install --disable-pip-version-check pyinstaller==5.13.2

      - name: Build launcher
        run: python -m PyInstaller --noconfirm --clean --onefile --console --name "Start SermonScribe" start_sermonscribe.py

      - name: Verify x86 executable
        shell: powershell
        run: |
          $path = 'dist\Start SermonScribe.exe'
          if (!(Test-Path $path)) { throw 'Launcher executable was not created.' }
          $bytes = [IO.File]::ReadAllBytes($path)
          $pe = [BitConverter]::ToInt32($bytes, 0x3c)
          $machine = [BitConverter]::ToUInt16($bytes, $pe + 4)
          if ($machine -ne 0x14c) { throw ('Expected PE32 x86, got machine 0x{0:X}' -f $machine) }
          Write-Host 'Verified PE32 x86 launcher built with Python 3.8.10.'
          Get-Item $path | Format-List Name,Length,LastWriteTime

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: sermon-scribe-win7-launcher
          path: dist/Start SermonScribe.exe
          if-no-files-found: error
